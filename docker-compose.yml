services:
  docker-tg-bot:
    image: ghcr.io/yanganan/fn-docker-tg-bot:latest
    container_name: docker-tg-bot
    restart: unless-stopped
    environment:
      # 必填：Telegram Bot Token。
      TELEGRAM_TOKEN: "123456:replace_me"

      # 必填：你的 Telegram 用户 ID。多个用户用 ALLOWED_USER_IDS。
      ALLOWED_USER_ID: "123456789"
      # ALLOWED_USER_IDS: "123456789,987654321"

      # 必填：飞牛宿主机上 docker compose 服务目录。
      DOCKER_COMPOSE_DIR: "/vol1/1000/docker-services"

      # 可选：compose 文件不是默认文件名时填写。
      # DOCKER_COMPOSE_FILE: "/vol1/1000/docker-services/docker-compose.yml"

      COMMAND_TIMEOUT: "120"
      # 镜像拉取超时（默认为 COMMAND_TIMEOUT × 5 = 600s）。大镜像下载慢时适当调大。
      PULL_TIMEOUT: "600"
      LOG_TAIL: "80"
      LOG_LEVEL: "INFO"

      # Phase 2: 监控
      ENABLE_EVENT_MONITOR: "true"
      EVENT_IGNORE: "watchtower,cadvisor"
      ENABLE_RESOURCE_MONITOR: "true"
      DISK_THRESHOLD: "85"
      MEM_THRESHOLD: "90"
      CPU_THRESHOLD: "95"
      ALERT_COOLDOWN: "1800"

      # Phase 3: 更新检查 + 历史
      ENABLE_UPDATE_CHECKER: "true"
      UPDATE_CHECK_INTERVAL: "6"
      UPDATE_IGNORE: "watchtower,cadvisor"
      HISTORY_DB: "/data/bot_history.db"

      # 可选：飞牛无法直连 Telegram 时配置代理。
      # 常见 HTTP 代理示例：http://192.168.1.2:7890
      # 常见 SOCKS5 代理示例：socks5://192.168.1.2:7891
      # TELEGRAM_PROXY_URL: "http://192.168.1.2:7890"
      TELEGRAM_CONNECT_TIMEOUT: "15"
      TELEGRAM_READ_TIMEOUT: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /vol1/1000/docker-services:/vol1/1000/docker-services
      - bot-data:/data
    working_dir: /app

volumes:
  bot-data:
